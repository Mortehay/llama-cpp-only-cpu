services:
  # Upgrade LLM Engine to CUDA
  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda
    command: >
      --server --host 0.0.0.0 --port 8080
      --models-dir /models
      --models-max 4
      -ctk q8_0 -ctv q8_0
      --threads 8
      --n-gpu-layers 35
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Upgrade Sprite Worker to use GPU
  sprite-worker:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Upgrade Sprite Generator for consistency
  sprite-generator:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
