name: llama-cpp-only-cpu
services:
  # 1. Model Downloader (Skips if exists)
  downloader:
    build:
      context: ./downloader
      dockerfile: Dockerfile
    container_name: model_downloader
    platform: linux/amd64
    volumes:
      - ../../models:/models
      - ./downloader/models.txt:/usr/local/bin/models.txt
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: ["-c", "/usr/local/bin/download_models.sh && tail -f /dev/null"]

  # 2. Multi-Model LLM Engine
  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:full
    platform: linux/amd64
    container_name: llm_engine
    depends_on:
      downloader:
        condition: service_started
    volumes:
      - ../../models:/models
    command: >
      --server --host 0.0.0.0 --port 8080
      --models-dir /models
      --models-max 4
      -ctk q8_0 -ctv q8_0
      --threads 8
    restart: unless-stopped

  # 3. Database
  db:
    image: postgres:15-alpine
    container_name: stats_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # 5. Open WebUI (Chat Interface)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui
    environment:
      - OPENAI_API_BASE_URL=http://stats_collector:8000/v1
      - OPENAI_API_KEY=sk-dummy
      - WEBUI_AUTH=False
      - ENABLE_OLLAMA_API=false
      - ENABLE_SIGNUP=false
    ports:
      - "3000:8080"
    restart: unless-stopped
    depends_on:
      - collector

  # 6. Grafana (Stats Visualizer)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - db

  # 4. Collector
  collector:
    build: 
      context: ../../
      dockerfile: compose/develop/collector/Dockerfile
    container_name: stats_collector
    depends_on:
      - llm-server
      - db
    volumes:
      - ../../src/collector:/app
    environment:
      LLM_URL: "http://llm-server:8080"
      DB_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
    ports:
      - "8000:8000"

  # 7. Model Orchestrator UI
  orchestrator:
    build:
      context: ../../
      dockerfile: compose/develop/orchestrator/Dockerfile
    container_name: model_orchestrator
    volumes:
      - ../../models:/models
      - ../../src/orchestrator:/app
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "7860:7860"
    restart: unless-stopped
    depends_on:
      - downloader

  # 8. Sprite Generator 
  sprite-generator:
    build:
      context: ../../
      dockerfile: compose/develop/sprite_generator/Dockerfile
    container_name: sprite_generator
    volumes:
      - ../../models:/models
      - ../../src/sprite_generator:/app
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "8001:8001"
    restart: unless-stopped