<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Model Orchestrator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1e2a 0%, #0d0f14 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    .badge {
      margin-left: auto;
      background: rgba(99,102,241,0.15);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
    }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Download form */
    .download-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--card-shadow);
    }

    .download-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .download-card p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    .btn {
      padding: 0.62rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Progress log */
    .log-box {
      margin-top: 1rem;
      background: #080a0f;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: #94a3b8;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .log-box.active { display: block; }
    .log-line { line-height: 1.7; }
    .log-line.done { color: var(--green); font-weight: 600; }
    .log-line.err { color: var(--red); }

    /* Models grid */
    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .model-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      box-shadow: var(--card-shadow);
      transition: border-color 0.2s, transform 0.2s;
    }

    .model-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-2px); }

    .model-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .model-icon {
      width: 38px; height: 38px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .model-icon.llama { background: rgba(249,115,22,0.15); }
    .model-icon.mistral { background: rgba(59,130,246,0.15); }
    .model-icon.gemma { background: rgba(34,197,94,0.15); }
    .model-icon.other { background: rgba(139,92,246,0.15); }

    .model-name {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .model-file {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
      font-family: monospace;
    }

    .model-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .size-badge {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
    }

    .btn-delete {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 7px;
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.9rem; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stats-bar {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      flex: 1;
    }

    .stat-value { font-size: 1.75rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      box-shadow: var(--card-shadow);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>LLM Model Orchestrator</h1>
    <p>Manage and download models for your llama.cpp cluster</p>
  </div>
  <div class="badge" id="engine-status">⬤ Connected</div>
</header>

<main>
  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="model-count">—</div>
      <div class="stat-label">Models Downloaded</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="total-size">—</div>
      <div class="stat-label">Total Storage Used</div>
    </div>
    <div class="stat">
      <div class="stat-value">8080</div>
      <div class="stat-label">LLM Engine Port</div>
    </div>
  </div>

  <!-- Download section -->
  <div class="download-card">
    <h2>⬇️ Download New Model</h2>
    <p>Download any GGUF model directly from HuggingFace into your models folder.</p>
    <div class="form-row">
      <div class="field">
        <label>HuggingFace Repository</label>
        <input id="repo" type="text" placeholder="bartowski/Qwen2.5-1.5B-Instruct-GGUF" />
      </div>
      <div class="field">
        <label>Filename (.gguf)</label>
        <input id="file" type="text" placeholder="Qwen2.5-1.5B-Instruct-Q4_K_M.gguf" />
      </div>
      <button class="btn btn-primary" id="dl-btn" onclick="startDownload()">Download</button>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <!-- Models list -->
  <div class="section-title">Downloaded Models</div>
  <div class="models-grid" id="models-grid">
    <div class="empty-state"><div class="icon">⏳</div><p>Loading models...</p></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  function getIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('llama')) return { icon: '🦙', cls: 'llama' };
    if (n.includes('mistral')) return { icon: '🌪️', cls: 'mistral' };
    if (n.includes('gemma')) return { icon: '💎', cls: 'gemma' };
    return { icon: '🤖', cls: 'other' };
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function loadModels() {
    const res = await fetch('/api/models');
    const models = await res.json();
    const grid = document.getElementById('models-grid');
    document.getElementById('model-count').textContent = models.length;
    const total = models.reduce((s, m) => s + m.size_mb, 0);
    document.getElementById('total-size').textContent = total >= 1024
      ? (total / 1024).toFixed(1) + ' GB'
      : total.toFixed(0) + ' MB';

    if (!models.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">📂</div><p>No models downloaded yet.</p></div>`;
      return;
    }

    grid.innerHTML = models.map(m => {
      const { icon, cls } = getIcon(m.name);
      return `
        <div class="model-card" id="card-${encodeURIComponent(m.file)}">
          <div class="model-card-header">
            <div class="model-icon ${cls}">${icon}</div>
            <div style="flex:1">
              <div class="model-name">${m.name}</div>
              <div class="model-file">${m.file}</div>
            </div>
          </div>
          <div class="model-footer">
            <span class="size-badge">${m.size_mb >= 1024 ? (m.size_mb/1024).toFixed(1)+' GB' : m.size_mb+' MB'}</span>
            <button class="btn-delete" onclick="deleteModel('${m.file}', '${m.name}')">🗑 Remove</button>
          </div>
        </div>`;
    }).join('');
  }

  async function deleteModel(filename, name) {
    if (!confirm(`Remove "${name}"? This will delete the .gguf file from disk.`)) return;
    const res = await fetch(`/api/models/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.status === 'deleted') {
      showToast(`Removed ${name}`, 'success');
      loadModels();
    } else {
      showToast('Could not delete model', 'error');
    }
  }

  async function startDownload() {
    const repo = document.getElementById('repo').value.trim();
    const file = document.getElementById('file').value.trim();
    if (!repo || !file) { showToast('Please fill in both fields', 'error'); return; }

    const btn = document.getElementById('dl-btn');
    const log = document.getElementById('log-box');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Downloading...';
    log.innerHTML = '';
    log.classList.add('active');

    const es = new EventSource(`/api/download/stream?repo=${encodeURIComponent(repo)}&file=${encodeURIComponent(file)}`);
    es.onmessage = (e) => {
      if (e.data === '__DONE__') {
        es.close();
        const line = document.createElement('div');
        line.className = 'log-line done';
        line.textContent = '✓ Download complete!';
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
        btn.disabled = false;
        btn.textContent = 'Download';
        showToast(`Downloaded ${file}!`, 'success');
        loadModels();
        return;
      }
      if (e.data.trim()) {
        const line = document.createElement('div');
        line.className = 'log-line';
        line.textContent = e.data;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
      }
    };
    es.onerror = () => {
      es.close();
      btn.disabled = false;
      btn.textContent = 'Download';
      showToast('Download failed or connection lost', 'error');
    };
  }

  loadModels();
  setInterval(loadModels, 10000);
</script>
</body>
</html>
